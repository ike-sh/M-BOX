# ── 分流规则（完整版；全部用内置 GEOSITE/GEOIP，离线可用，含去广告）────────────
rules:
  - GEOSITE,private,🎯 全球直连
  - GEOIP,private,🎯 全球直连,no-resolve
  - DST-PORT,853,REJECT          # 封 DoT(DNS over TLS) 绕过，强制走网关 DNS（防 DNS 泄漏）
  - GEOSITE,category-ads-all,REJECT
  - GEOSITE,google-cn,🎯 全球直连
